<!DOCTYPE html>
<html>

<head>
    <title>HTML Table Example</title>
</head>

<body>
    <h2>My Friends Table</h2>

    <table border="1" cellpadding="10" cellspacing="0">
        <tr>
            <th>NAME</th>
            <th>AGE</th>
            <th>COURSE</th>
        </tr>
        <tr>
            <td>Rahul</td>
            <td>18</td>
            <td>BCA</td>
        </tr>
        <tr>
            <td>Shurov</td>
            <td>17</td>
            <td>BCA</td>
        </tr>
        <tr>
            <td>Tridev</td>
            <td>18</td>
            <td>BCA</td>
        </tr>
    </table>
</body>

</html>
